syntax = "proto3";

package redpanda.core.admin;

import "proto/redpanda/core/version.proto";
import "proto/redpanda/pbgen/options.proto";
import "proto/redpanda/pbgen/rpc.proto";

option (redpanda.pbgen.cpp_namespace) = "proto::admin";

message GetVersionRequest {}
message GetVersionResponse {
    redpanda.core.Version version = 1;
}

// The AdminService is used to get information about the Redpanda cluster.
//
// NOTE: This should be very small and only hold a few RPCs that are core to the
// Admin API, other APIs should be split out into seperate services.
service AdminService {
    rpc GetVersion(GetVersionRequest) returns (GetVersionResponse) {
        option (redpanda.pbgen.rpc) = {
            version: V25_2_0,
            authz: SUPERUSER,
        };
    }
}
