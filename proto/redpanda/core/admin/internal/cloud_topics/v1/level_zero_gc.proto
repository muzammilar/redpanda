syntax = "proto3";

package redpanda.core.admin.internal.cloud_topics.v1;

import "proto/redpanda/core/pbgen/options.proto";
import "proto/redpanda/core/pbgen/rpc.proto";
import "proto/redpanda/core/common/v1/ntp.proto";

option (pbgen.cpp_namespace) = "proto::admin::level_zero_gc";

// Admin endpoints to query Level-0 garbage collection workers for Cloud Topics.

service LevelZeroGcService {
    // Returns GC worker status for each shard on targeted node(s).
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }

    // Starts GC workers on targeted node(s).
    rpc Start(StartRequest) returns (StartResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }

    // Pauses GC workers on targeted node(s).
    rpc Pause(PauseRequest) returns (PauseResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }

    // Advance a cloud topic partition to the current cluster epoch.
    rpc AdvanceEpoch(AdvanceEpochRequest) returns (AdvanceEpochResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }

    // Query epoch state for one or more cloud topic partitions.
    rpc GetEpochInfo(GetEpochInfoRequest) returns (GetEpochInfoResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
}

// Request to query GC worker status.
message GetStatusRequest {
    // Target a specific node, or omit to query all nodes in the cluster.
    optional int32 node_id = 1;
}

// Aggregated status from one or more nodes.
message GetStatusResponse {
    repeated NodeStatus nodes = 1;
}

// GC status for all shards on a single node.
message NodeStatus {
    int32 node_id = 1;
    // One entry per shard on this node.
    repeated ShardStatus shards = 2;
    // Set if the node could not be reached or returned an error.
    optional string error = 3;
}

// Status of the GC worker on a single shard.
message ShardStatus {
    int32 shard_id = 1;
    Status status = 2;
}

// Request to start GC workers.
message StartRequest {
    // Target a specific node, or omit to start on all nodes.
    optional int32 node_id = 1;
}

// Aggregated start results from one or more nodes.
message StartResponse {
    repeated StartResult results = 1;
}

// Request to pause GC workers.
message PauseRequest {
    // Target a specific node, or omit to pause on all nodes.
    optional int32 node_id = 1;
}

// Aggregated pause results from one or more nodes.
message PauseResponse {
    repeated PauseResult results = 1;
}

// Outcome of starting GC on a single node.
message StartResult {
    int32 node_id = 1;
    // Set if the node could not be reached or returned an error.
    optional string error = 3;
}

// Outcome of pausing GC on a single node.
message PauseResult {
    int32 node_id = 1;
    // Set if the node could not be reached or returned an error.
    optional string error = 3;
}

// Request to advance a partition to the current cluster epoch.
message AdvanceEpochRequest {
    common.v1.TopicPartition partition = 1;
    int64 new_epoch = 2;
}

// Response containing epoch state after a successful advance.
message AdvanceEpochResponse {
    EpochInfo epoch = 1;
}

// Request epoch info for a single partition.
message GetEpochInfoRequest {
    common.v1.TopicPartition partition = 1;
}

// Response with epoch info for the requested partition.
message GetEpochInfoResponse {
    EpochInfo epoch = 1;
}

// Epoch state snapshot for a cloud topic partition.
message EpochInfo {
    // Largest epoch no longer referenced by the partition.
    int64 estimated_inactive_epoch = 1;
    // Highest epoch applied to the partition STM.
    int64 max_applied_epoch = 2;
    // Log offset of the last reconciled record.
    int64 last_reconciled_log_offset = 3;
    // Log offset at which max_applied_epoch was set.
    int64 current_epoch_window_offset = 4;
}

// GC worker lifecycle states.
// Maps to cloud_topics::level_zero_gc::state.
enum Status {
    L0_GC_STATUS_UNSPECIFIED = 0;
    L0_GC_STATUS_PAUSED = 1;
    L0_GC_STATUS_RUNNING = 2;
    L0_GC_STATUS_STOPPING = 3;
    L0_GC_STATUS_STOPPED = 4;
}
