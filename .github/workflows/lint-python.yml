---
name: Lint python
on:
  push:
    branches: [dev]
    paths:
      - '**.py'
      - '.github/workflows/lint-python.yml'
    tags-ignore:
      - '**'
  pull_request:
    paths:
      - '**.py'
      - '.github/workflows/lint-python.yml'
jobs:
  py:
    name: Lint python files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"
          version: "0.12.10"
