---
name: Lint & Test rp-storage-tool
on:
  push:
    branches: [dev]
    paths:
      - 'tools/rp_storage_tool/**'
      - '.github/workflows/rp-storage-tool-checks.yml'
    tags-ignore:
      - '**'
  pull_request:
    paths:
      - 'tools/rp_storage_tool/**'
      - '.github/workflows/rp-storage-tool-checks.yml'
  merge_group:
    types: [checks_requested]
jobs:
  check:
    name: Compile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run cargo check
        run: cargo check --manifest-path tools/rp_storage_tool/Cargo.toml
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run cargo test
        run: cargo test --manifest-path tools/rp_storage_tool/Cargo.toml
